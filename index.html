<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SHUSHAN | Portfolio</title>
    <meta name="description" content="书山压力大作品展示：地编、建模、游戏蓝图、B站与番茄小说。" />
    <link rel="stylesheet" href="styles.css" />
    <script src="content.js" defer></script>
    <script src="portfolio-manifest.js" defer></script>
    <script src="main.js" defer></script>
  </head>
  <body>
    <header class="site-header" aria-label="页面导航">
      <a class="brand" href="#level">SHUSHAN</a>
      <nav class="nav-links" aria-label="模块导航">
        <a href="#level">地编</a>
        <a href="#modeling">建模</a>
        <a href="#game">游戏蓝图</a>
        <a href="#bilibili">B站</a>
        <a href="#fanqie">番茄小说</a>
      </nav>
      <div class="header-contact" data-header-contact></div>
    </header>

    <main>
      <section class="module level-module" id="level" aria-labelledby="level-title">
        <div class="module-header">
          <span>01 / Level Art</span>
          <h1 id="level-title">地编</h1>
        </div>
        <div class="level-projects" data-level-projects></div>
      </section>

      <section class="module" id="modeling" aria-labelledby="modeling-title">
        <div class="module-header">
          <span>02 / Modeling</span>
          <h1 id="modeling-title">建模</h1>
        </div>
        <div class="showcase-grid" data-modeling-grid></div>
      </section>

      <section class="module game-module" id="game" aria-labelledby="game-title">
        <div class="module-header">
          <span>03 / Game Blueprint</span>
          <h1 id="game-title">游戏蓝图</h1>
        </div>
        <div class="game-layout" data-game-module></div>
      </section>

      <section class="module social-module" id="bilibili" aria-labelledby="bilibili-title">
        <div class="module-header">
          <span>04 / Video Channel</span>
          <h1 id="bilibili-title">B站</h1>
        </div>
        <div class="external-card" data-bilibili-module></div>
      </section>

      <section class="module social-module" id="fanqie" aria-labelledby="fanqie-title">
        <div class="module-header">
          <span>05 / 番茄小说</span>
          <h1 id="fanqie-title">番茄小说</h1>
        </div>
        <div class="external-card fanqie-card" data-fanqie-module></div>
      </section>
    </main>
  </body>
</html>
