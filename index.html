<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>书山压力大 ciallo～(∠・ω&lt; )⌒☆</title>
    <meta name="description" content="书山压力大作品展示：地编、建模、蓝图、B站与番茄小说。" />
    <link rel="icon" type="image/png" href="assets/external/favicon-circle.png" />
    <link rel="stylesheet" href="styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
      }
    </script>
    <script src="content.js" defer></script>
    <script src="portfolio-manifest.js" defer></script>
    <script src="main.js" defer></script>
  </head>
  <body>
    <div class="intro-slice" data-intro-slice aria-hidden="true"></div>
    <header class="site-header" aria-label="页面导航">
      <a class="brand" href="#level">SHUSHAN</a>
      <nav class="nav-links" aria-label="模块导航">
        <a href="#level">地编</a>
        <a href="#modeling">建模</a>
        <a href="#game">蓝图</a>
        <a href="#video">视频</a>
        <a href="#bilibili">B站</a>
        <a href="#fanqie">番茄小说</a>
        <a href="#texture-tool">贴图工具</a>
      </nav>
      <div class="header-contact" data-header-contact></div>
    </header>

    <main>
      <section class="module level-module" id="level" aria-labelledby="level-title">
        <div class="module-header">
          <span>01 / Level Art</span>
          <h1 id="level-title">地编</h1>
        </div>
        <div class="level-projects" data-level-projects></div>
      </section>

      <section class="module" id="modeling" aria-labelledby="modeling-title">
        <div class="module-header">
          <span>02 / Modeling</span>
          <h1 id="modeling-title">建模</h1>
        </div>
        <div class="showcase-grid" data-modeling-grid></div>
      </section>

      <section class="module game-module" id="game" aria-labelledby="game-title">
        <div class="module-header">
          <span>03 / Blueprint</span>
          <h1 id="game-title">蓝图</h1>
        </div>
        <div class="game-layout" data-game-module></div>
      </section>

      <section class="module video-module" id="video" aria-labelledby="video-title">
        <div class="module-header">
          <span>04 / Video</span>
          <h1 id="video-title">视频</h1>
        </div>
        <div class="video-showcase" data-video-module></div>
      </section>

      <section class="module social-module" id="bilibili" aria-labelledby="bilibili-title">
        <div class="module-header">
          <span>05 / Video Channel</span>
          <h1 id="bilibili-title">B站</h1>
        </div>
        <div class="external-card" data-bilibili-module></div>
      </section>

      <section class="module social-module" id="fanqie" aria-labelledby="fanqie-title">
        <div class="module-header">
          <span>06 / 番茄小说</span>
          <h1 id="fanqie-title">番茄小说</h1>
        </div>
        <div class="external-card fanqie-card" data-fanqie-module></div>
      </section>

      <section class="module texture-module" id="texture-tool" aria-labelledby="texture-tool-title">
        <div class="module-header">
          <span>07 / Tileable Texture</span>
          <h1 id="texture-tool-title">无缝贴图</h1>
        </div>
        <div class="texture-tool" data-texture-tool></div>
      </section>
    </main>
  </body>
</html>
